<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaar - Login</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
  <div class="auth-container">
    <h1>Klaar</h1>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" autocomplete="username" autocapitalize="none" autocorrect="off" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Log in</button>
      <p id="error" class="error hidden"></p>
    </form>
    <p id="register-link" class="hidden" style="margin-top:1rem;font-size:0.9rem;">
      Don't have an account? <a href="#" id="show-register">Create one</a>
    </p>
    <form id="register-form" class="hidden">
      <h3 style="margin-bottom:0.5rem;">Create Account</h3>
      <input type="text" id="reg-username" placeholder="Username" autocomplete="username" autocapitalize="none" autocorrect="off" required>
      <input type="text" id="reg-display" placeholder="Display name (optional)" autocomplete="name">
      <input type="password" id="reg-password" placeholder="Password (6+ characters)" autocomplete="new-password" required minlength="6">
      <button type="submit">Create account</button>
      <p id="reg-error" class="error hidden"></p>
    </form>
  </div>
  <script>
    // Check if registration is open (may require ?invite= token in URL)
    const _inviteToken = new URLSearchParams(location.search).get("invite");
    const _statusUrl = "/api/registration-status" + (_inviteToken ? "?invite=" + encodeURIComponent(_inviteToken) : "");
    fetch(_statusUrl).then(r => r.json()).then(data => {
      if (data.open) {
        document.getElementById("register-link").classList.remove("hidden");
        // If arriving via an invite link, jump straight to the registration form
        if (_inviteToken) {
          document.getElementById("login-form").classList.add("hidden");
          document.getElementById("register-link").classList.add("hidden");
          document.getElementById("register-form").classList.remove("hidden");
        }
      }
    });

    document.getElementById("show-register").addEventListener("click", (e) => {
      e.preventDefault();
      document.getElementById("login-form").classList.add("hidden");
      document.getElementById("register-link").classList.add("hidden");
      document.getElementById("register-form").classList.remove("hidden");
    });

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("reg-error");
      errEl.classList.add("hidden");
      const res = await fetch("/api/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username: document.getElementById("reg-username").value,
          display_name: document.getElementById("reg-display").value,
          password: document.getElementById("reg-password").value,
          invite_token: _inviteToken,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = "/" + (location.hash || "");
      } else {
        errEl.textContent = data.error || "Registration failed";
        errEl.classList.remove("hidden");
      }
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("error");
      errEl.classList.add("hidden");
      const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = "/" + (location.hash || "");
      } else {
        errEl.textContent = data.error || "Login failed";
        errEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
