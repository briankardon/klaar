<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klaar</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Klaar</h1>
    <div class="header-right">
      <span id="user-display"></span>
      <button id="btn-logout" title="Log out">Logout</button>
    </div>
  </header>

  <main>
    <!-- Sidebar: list of todo lists -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <h2>Lists</h2>
        <div class="sidebar-btns">
          <button id="btn-export-list" title="Export list">&#x21e9;</button>
          <button id="btn-import-list" title="Import from text">&#x21e7;</button>
          <button id="btn-new-list" title="New list">+</button>
        </div>
      </div>
      <ul id="list-index"></ul>
    </nav>

    <!-- Main content: selected todo list -->
    <section id="list-view" class="hidden">
      <div class="list-header">
        <h2 id="list-title" contenteditable="true"></h2>
      </div>
      <div id="search-area">
        <div id="search-row">
          <input type="text" id="search-input" placeholder="Search / filter (regex)…" autocomplete="off">
          <div id="completion-filter">
            <button class="comp-btn active" data-mode="all">All</button>
            <button class="comp-btn" data-mode="active">Active</button>
            <button class="comp-btn" data-mode="done">Done</button>
          </div>
        </div>
        <div id="filter-bar" class="hidden"></div>
      </div>
      <div id="collapse-bar" class="hidden"></div>
      <div id="items-container">
        <div id="fold-gutter"></div>
        <ul id="items"></ul>
      </div>
    </section>

    <!-- Right sidebar: tags -->
    <nav id="tag-pane" class="hidden">
      <div class="sidebar-header">
        <h2>Tags</h2>
        <button id="btn-new-tag" title="New tag">+</button>
      </div>
      <ul id="tag-list"></ul>
    </nav>

    <section id="empty-state">
      <p>Select or create a list to get started.</p>
    </section>
  </main>

  <!-- Import modal -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Import text</h3>
      <textarea id="import-text" rows="15" placeholder="Paste your list here..."></textarea>
      <div class="modal-buttons">
        <button id="import-new-list">Import as new list</button>
        <button id="import-to-current" disabled>Add to current list</button>
        <button id="import-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
